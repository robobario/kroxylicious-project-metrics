name: Harvest PR data

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      full_rescrape:
        description: 'Delete all existing data and re-harvest from the project epoch'
        type: boolean
        default: false
      days:
        description: 'Re-process PRs updated in the last N days (overrides last_harvest.json)'
        type: number
        required: false

permissions:
  contents: write
  actions: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: _data
          path: data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset data for full rescrape
        if: inputs.full_rescrape
        run: |
          cd data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          while read -r line; do
            [ -z "$line" ] || [[ "$line" == \#* ]] && continue
            owner=$(echo "$line" | cut -d/ -f1)
            repo=$(echo "$line" | cut -d/ -f2)
            [ -n "$owner" ] && [ -n "$repo" ] && rm -rf "${owner}/${repo}"
          done < ../repos.txt
          git add .
          if git diff --staged --quiet; then
            echo "Data was already empty."
          else
            git commit -m "chore: wipe data for full rescrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Harvest PR data
        env:
          GITHUB_TOKEN: ${{ secrets.KROXYLICIOUS_PAT }}
        run: |
          args=""
          [ -n "${{ inputs.days }}" ] && args="--days ${{ inputs.days }}"
          python scripts/harvest.py $args

      - name: Lint data
        run: python scripts/lint.py

      - name: Commit and push to _data
        id: commit
        run: |
          cd data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: harvest PR data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site publish
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run publish.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
