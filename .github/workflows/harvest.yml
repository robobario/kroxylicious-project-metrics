name: Harvest PR data

on:
  schedule:
    - cron: '17 */4 * * *'
  workflow_dispatch:
    inputs:
      full_rescrape:
        description: 'Delete all existing data and re-harvest from the project epoch'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: _data
          path: data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset data for full rescrape
        if: inputs.full_rescrape
        run: |
          cd data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf prs
          mkdir prs
          touch prs/.gitkeep
          echo '{"last_run": null}' > last_harvest.json
          git add .
          if git diff --staged --quiet; then
            echo "Data was already empty."
          else
            git commit -m "chore: wipe data for full rescrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Harvest PR data
        env:
          GITHUB_TOKEN: ${{ secrets.KROXYLICIOUS_PAT }}
          GITHUB_OWNER: kroxylicious
          GITHUB_REPO: kroxylicious
        run: python scripts/harvest.py

      - name: Lint data
        run: python scripts/lint.py

      - name: Commit and push to _data
        id: commit
        run: |
          cd data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: harvest PR data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site publish
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run publish.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
